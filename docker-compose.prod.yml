version: '3.8'

services:
  # 1. SQL Server Database Instance
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: apex-luxe-mssql
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=ApexLuxe@2024!
      - MSSQL_PID=Developer
    volumes:
      - mssql_data:/var/opt/mssql
    restart: always
    networks:
      - apex-network

  # 2. Redis Cache & Queue Broker
  redis:
    image: redis:7-alpine
    container_name: apex-luxe-redis
    command: redis-server --requirepass ApexLuxeRedis2026!
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - apex-network

  # 3. NestJS Backend Microservice
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: apex-luxe-backend
    expose:
      - "5000"
      - "9464"
    ports:
      - "9464:9464" # Prometheus scraping exporter
    environment:
      - PORT=5000
      - DATABASE_URL=sqlserver://mssql:1433;database=apexluxe;user=SA;password=ApexLuxe@2024!;encrypt=true;trustServerCertificate=true
      - JWT_SECRET=apex_luxe_jwt_secret_2026_ultra_secure_8Xk29Q
      - JWT_EXPIRES_IN=900s
      - JWT_REFRESH_SECRET=apex_luxe_refresh_secret_2026_Js92Lm
      - JWT_REFRESH_EXPIRES_IN=7d
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=ApexLuxeRedis2026!
      - GROQ_API_KEY=${GROQ_API_KEY}
      - THROTTLER_TTL=60
      - THROTTLER_LIMIT=1000
    depends_on:
      - mssql
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`localhost`) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`))"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=5000"
    restart: always
    networks:
      - apex-network

  # 4. Next.js Frontend Web Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: apex-luxe-frontend
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    restart: always
    networks:
      - apex-network

  # 5. Prometheus Metrics Scraper
  prometheus:
    image: prom/prometheus:latest
    container_name: apex-luxe-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: always
    networks:
      - apex-network

  # 6. Grafana Dashboards Visualizer
  grafana:
    image: grafana/grafana:latest
    container_name: apex-luxe-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always
    networks:
      - apex-network

  # 7. Reverse Proxy Routing Gate
  traefik:
    image: traefik:v2.10
    container_name: apex-luxe-proxy
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080" # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - apex-network

networks:
  apex-network:
    driver: bridge

volumes:
  mssql_data:
  redis_data:
  prometheus_data:
  grafana_data:
