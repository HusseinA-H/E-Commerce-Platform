version: '3.8'

services:
  # 1. NestJS E-Commerce Backend Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex_luxe_api
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=sqlserver://mssql:1433;database=apexluxe;user=SA;password=StrongPassword123!;encrypt=true;trustServerCertificate=true
      - JWT_SECRET=${JWT_SECRET:-apex_luxe_jwt_secret_key_2026}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-900s}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-apex_luxe_refresh_token_secret_key_2026}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-ApexLuxeRedis2026!}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      - MAIL_FROM=${MAIL_FROM}
      - THROTTLER_TTL=${THROTTLER_TTL:-60}
      - THROTTLER_LIMIT=${THROTTLER_LIMIT:-100}
    depends_on:
      mssql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/v1', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # 2. Microsoft SQL Server Instance
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: apex_luxe_db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=StrongPassword123!
      - MSSQL_PID=Developer
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "SA", "-P", "StrongPassword123!", "-Q", "SELECT 1", "-No"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # 3. Redis Caching Instance (password-protected, not exposed to host)
  redis:
    image: redis:7-alpine
    container_name: apex_luxe_cache
    command: redis-server --requirepass ApexLuxeRedis2026! --appendonly yes
    # Note: Redis port NOT exposed to host — internal Docker network only
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ApexLuxeRedis2026!", "PING"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  mssql_data:
    driver: local
  redis_data:
    driver: local
